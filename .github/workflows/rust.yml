# Copied from https://github.com/rerun-io/rerun_template
on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  rust-check:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-docs, clippy, rustfmt
          toolchain: 1.92.0
          override: true

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: check --all-features
        run: cargo check --all-features --all-targets

      - name: check default features
        run: cargo check --all-targets

      - name: check --no-default-features
        run: cargo check --no-default-features --all-targets

      - name: Test doc-tests
        run: cargo test --doc --all-features

      - name: cargo doc --lib
        run: cargo doc --lib --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --document-private-items --no-deps --all-features

      - name: Build tests
        run: cargo build --tests --all-features

      - name: Run test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  check_wasm:
    name: Check wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true
          target: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Check wasm32
        run: cargo check --target wasm32-unknown-unknown --lib -p arrow-quiver

  # ---------------------------------------------------------------------------

  arrow-versions:
    # The main job tests the locked (newest) arrow version; this matrix
    # covers the rest of the declared support range. Keep it in sync
    # with the `arrow` version requirement in Cargo.toml.
    name: Test with arrow ${{ matrix.arrow-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arrow-version: ["57.0.0", "58.0.0"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true

      - name: Pin arrow
        run: cargo update -p arrow --precise ${{ matrix.arrow-version }}

      - name: Test
        run: cargo test --all-features

  # ---------------------------------------------------------------------------

  cargo-deny:
    name: Check Rust dependencies (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: warn
          command: check
