# Copied from https://github.com/rerun-io/rerun_template
on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  rust-check:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-docs, clippy, rustfmt
          toolchain: 1.92.0
          override: true

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: check --all-features
        run: cargo check --all-features --all-targets

      - name: check default features
        run: cargo check --all-targets

      - name: check --no-default-features
        run: cargo check --no-default-features --all-targets

      - name: Test doc-tests
        run: cargo test --doc --all-features

      - name: cargo doc --lib
        run: cargo doc --lib --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --document-private-items --no-deps --all-features

      - name: Build tests
        run: cargo build --tests --all-features

      - name: Run test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  miri:
    name: Miri (unsafe soundness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Miri needs nightly. The `unsafe` we validate lives in `quiver_types`
      # (`value_unchecked` on the iteration hot path); the sliced-array
      # soundness tests live in `quiver`'s integration tests.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: miri

      # `f16_column` is skipped: `half`'s f16 conversions use inline asm, which
      # Miri cannot execute (it is unrelated to our `unsafe`).
      - name: Miri test
        run: |
          cargo miri test -p quiver_types --all-features
          cargo miri test -p quiver --all-features -- --skip f16

  # ---------------------------------------------------------------------------

  check_wasm:
    name: Check wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true
          target: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Check wasm32
        run: cargo check --target wasm32-unknown-unknown --lib -p quiver

  # ---------------------------------------------------------------------------

  arrow-versions:
    name: Test all supported arrow versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true

      # The version list lives in the script, which can also be run locally:
      - name: Test all supported arrow versions
        run: ./scripts/test_arrow_versions.sh

  # ---------------------------------------------------------------------------

  cargo-deny:
    name: Check Rust dependencies (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: warn
          command: check
