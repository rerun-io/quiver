# Copied from https://github.com/rerun-io/rerun_template
on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize]

name: Rust

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  rust-check:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-docs, clippy, rustfmt
          toolchain: 1.92.0
          override: true

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: check --all-features
        run: cargo check --all-features --all-targets

      - name: check default features
        run: cargo check --all-targets

      - name: check --no-default-features
        run: cargo check --no-default-features --all-targets

      - name: Test doc-tests
        run: cargo test --doc --all-features

      - name: cargo doc --lib
        run: cargo doc --lib --no-deps --all-features

      - name: cargo doc --document-private-items
        run: cargo doc --document-private-items --no-deps --all-features

      - name: Build tests
        run: cargo build --tests --all-features

      - name: Run test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------

  miri:
    name: Miri (unsafe soundness)
    runs-on: ubuntu-latest
    # This job checks soundness, not lints — the stable `Rust` job already
    # enforces `-D warnings`. Don't let a fresh nightly lint (warnings-as-errors)
    # fail the soundness check; override the workflow-level `RUSTFLAGS`.
    env:
      RUSTFLAGS: ""
      RUSTDOCFLAGS: ""
    steps:
      - uses: actions/checkout@v4

      # Miri needs nightly.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: miri

      # Only `quiver_types`: all the `unsafe` (`value_unchecked` + the iterator
      # combinators) lives there, and its `tests/soundness.rs` drives every path
      # over sliced arrays. Scoping to it keeps Miri fast — it avoids the heavy
      # `quiver` test crate and `trybuild` (which spawns the compiler per case,
      # something Miri can't run anyway). `--tests` skips doctests, which the
      # soundness test already covers.
      - name: Miri test
        run: cargo miri test -p quiver_types --all-features --tests

  # ---------------------------------------------------------------------------

  check_wasm:
    name: Check wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true
          target: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Check wasm32
        run: cargo check --target wasm32-unknown-unknown --lib -p quiver

  # ---------------------------------------------------------------------------

  arrow-versions:
    name: Test all supported arrow versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
          override: true

      # The version list lives in the script, which can also be run locally:
      - name: Test all supported arrow versions
        run: ./scripts/test_arrow_versions.sh

  # ---------------------------------------------------------------------------

  cargo-deny:
    name: Check Rust dependencies (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.92.0"
          log-level: warn
          command: check
